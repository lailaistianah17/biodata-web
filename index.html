<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Biodata</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #74ebd5, #9face6);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #444;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 8px rgba(108, 99, 255, 0.3);
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .radio-group label {
      font-weight: normal;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #574fd6;
    }

    .hasil {
      margin-top: 25px;
      padding: 20px;
      background: #f3f3f3;
      border-radius: 12px;
      display: none;
    }

    .hasil h2 {
      margin-bottom: 10px;
      color: #333;
    }

    .hasil p {
      margin: 6px 0;
      color: #555;
    }
  </style></head>
<body>
  <div class="container">
    <h1>Form Biodata</h1><form id="biodataForm">
  <div class="form-group">
    <label>Nama Lengkap</label>
    <input type="text" id="nama" required>
  </div>

  <div class="form-group">
    <label>Umur</label>
    <input type="number" id="umur" required>
  </div>

  <div class="form-group">
    <label>Jenis Kelamin</label>
    <div class="radio-group">
      <label><input type="radio" name="jk" value="Laki-laki" required> Laki-laki</label>
      <label><input type="radio" name="jk" value="Perempuan"> Perempuan</label>
    </div>
  </div>

  <div class="form-group">
    <label>Alamat</label>
    <textarea id="alamat" rows="3" required></textarea>
  </div>

  <div class="form-group">
    <label>Hobi</label>
    <input type="text" id="hobi" required>
  </div>

  <div class="form-group">
    <label>Sekolah</label>
    <input type="text" id="sekolah" required>
  </div>

  <button type="submit">Kirim Biodata</button>
</form>

<div class="hasil" id="hasil">
  <h2>Hasil Biodata</h2>
  <p><strong>Nama:</strong> <span id="hasilNama"></span></p>
  <p><strong>Umur:</strong> <span id="hasilUmur"></span></p>
  <p><strong>Jenis Kelamin:</strong> <span id="hasilJK"></span></p>
  <p><strong>Alamat:</strong> <span id="hasilAlamat"></span></p>
  <p><strong>Hobi:</strong> <span id="hasilHobi"></span></p>
  <p><strong>Sekolah:</strong> <span id="hasilSekolah"></span></p>
</div>

  </div>  <script>
    const form = document.getElementById('biodataForm');
    const hasil = document.getElementById('hasil');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const nama = document.getElementById('nama').value;
      const umur = document.getElementById('umur').value;
      const jk = document.querySelector('input[name="jk"]:checked').value;
      const alamat = document.getElementById('alamat').value;
      const hobi = document.getElementById('hobi').value;
      const sekolah = document.getElementById('sekolah').value;

      document.getElementById('hasilNama').textContent = nama;
      document.getElementById('hasilUmur').textContent = umur + ' tahun';
      document.getElementById('hasilJK').textContent = jk;
      document.getElementById('hasilAlamat').textContent = alamat;
      document.getElementById('hasilHobi').textContent = hobi;
      document.getElementById('hasilSekolah').textContent = sekolah;

      hasil.style.display = 'block';
    });
  </script></body>
</html>
